<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsightsLake 密度计算器</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header class="hero">
      <div class="hero-band">
        <a class="ghost-btn" href="index.html" data-i18n="backHome">返回主页</a>
        <button id="langSwitch" class="ghost-btn" type="button" data-i18n="lang.en">English</button>
      </div>
      <h1 data-i18n="densityPageTitle">密度计算器</h1>
      <p data-i18n="densityPageDesc">独立页面：依据晶圆直径和晶粒长宽估算每片晶圆可切分晶粒数与月产能。</p>
    </header>

    <main class="panel">
      <article class="glass-card">
        <h2 data-i18n="densityFormTitle">密度计算参数</h2>
        <form id="densityForm" autocomplete="off">
          <label>
            <span data-i18n="densityWafer">晶圆直径（mm）</span>
            <input type="number" id="waferDiameter" min="100" max="500" step="10" value="300" />
          </label>
          <label>
            <span data-i18n="densityDieL">晶粒长（mm）</span>
            <input type="number" id="dieLength" min="0.1" step="0.05" value="8" />
          </label>
          <label>
            <span data-i18n="densityDieW">晶粒宽（mm）</span>
            <input type="number" id="dieWidth" min="0.1" step="0.05" value="8" />
          </label>
          <label>
            <span data-i18n="densityEdge">边缘保留（mm）</span>
            <input type="number" id="edgeAllowance" min="0" step="0.5" value="2" />
          </label>
          <label>
            <span data-i18n="waferPerMonth">月晶圆片数（片）</span>
            <input type="number" id="waferPerMonth" min="1" step="1" value="1200" />
          </label>
          <button type="submit" class="primary-btn" data-i18n="btnRunDensity">开始计算</button>
        </form>
        <div class="result" id="densityResult" data-i18n="densityInitial">
          待计算，输入参数后点击按钮。
        </div>
      </article>
    </main>

    <footer>
      <p data-i18n="footer">InsightsLake · Semiconductor Process Intelligence</p>
    </footer>

    <script src="i18n.js"></script>
    <script src="density.js"></script>
  </body>
</html>
