<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsightsLake 良率分析器</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header class="hero">
      <div class="hero-band">
        <a class="ghost-btn" href="index.html" data-i18n="backHome">返回主页</a>
        <button id="langSwitch" class="ghost-btn" type="button" data-i18n="lang.en">English</button>
      </div>
      <h1 data-i18n="yieldPageTitle">良率分析器</h1>
      <p data-i18n="yieldPageDesc">独立页面：基于泊松模型与 Murphy 模型，给出良率预估和曲线示意图。</p>
    </header>

    <main class="panel">
      <article class="glass-card">
        <h2 data-i18n="yieldFormTitle">分析参数</h2>
        <form id="yieldForm" autocomplete="off">
          <label>
            <span data-i18n="yieldDieArea">晶粒面积（mm²）</span>
            <input type="number" id="dieArea" min="0.1" step="0.1" value="64" />
          </label>
          <label>
            <span data-i18n="yieldDiesPerWafer">每片理论晶粒数</span>
            <input type="number" id="diesPerWafer" min="1" step="1" value="800" />
          </label>
          <label>
            <span data-i18n="yieldDefectDensity">缺陷密度 D0（defects/cm²）</span>
            <input type="number" id="defectDensity" min="0" step="0.001" value="0.08" />
          </label>
          <label>
            <span data-i18n="yieldK">Murphy k</span>
            <input type="number" id="clusteringK" min="0.1" step="0.1" value="1.2" />
          </label>
          <label>
            <span data-i18n="yieldWaferPerMonth">月晶圆片数（片）</span>
            <input type="number" id="yieldWaferPerMonth" min="1" step="1" value="1200" />
          </label>
          <label>
            <span data-i18n="yieldTarget">目标良率（%）</span>
            <input type="number" id="targetYield" min="1" max="100" step="0.1" value="90" />
          </label>
          <button type="submit" class="primary-btn" data-i18n="btnRunYield">开始分析</button>
        </form>
        <div class="chart-wrap">
          <h3 data-i18n="yieldChartTitle">泊松/Murphy 示例曲线</h3>
          <canvas id="yieldChart" width="900" height="320"></canvas>
        </div>
        <div class="result" id="yieldResult" data-i18n="yieldInitial">
          待计算，输入参数后点击按钮。
        </div>
      </article>
    </main>

    <footer>
      <p data-i18n="footer">InsightsLake · Semiconductor Process Intelligence</p>
    </footer>

    <script src="i18n.js"></script>
    <script src="yield.js"></script>
  </body>
</html>
